type Query {
    ping: String
    me: User
    user(username: String!): User
    booq(id: ID!): Booq
    author(name: String!): Author
    search(query: String!, limit: Int): [SearchResult!]
    history(limit: Int, offset: Int): [BooqHistory]
    collection(name: String!): Collection
    featured(limit: Int!): [Booq]
    notes(username: String!, limit: Int, offset: Int): [Note!]!
    libraryBrowse(library: String!, kind: LibraryBrowseKind!, query: String!, limit: Int, offset: Int): LibraryBrowseResult!
    copilot(context: CopilotContext!): Copilot
}
type Subscription {
    copilotAnswerStream(context: CopilotContext!, question: String!, footnote: String): String!
}
type Mutation {
    addBookmark(bookmark: BookmarkInput!): Boolean
    removeBookmark(id: ID!): Boolean
    addNote(note: NoteInput!): Boolean
    removeNote(id: ID!): Boolean
    updateNote(id: ID!, kind: String, content: String): Boolean
    addBooqHistory(event: BooqHistoryInput!): Boolean
    addToCollection(name: String!, booqId: ID!): Boolean
    removeFromCollection(name: String!, booqId: ID!): Boolean

    initPasskeyRegistration: InitPasskeyRegistrationResponse
    verifyPasskeyRegistration(
        id: String!
        response: WebAuthnRegistrationResponseJSON!
    ): AuthResult
    initPasskeyLogin: InitPasskeyLoginResponse
    verifyPasskeyLogin(
        id: String!
        response: WebAuthnAuthenticationResponseJSON!
    ): AuthResult

    initiateSign(email: String!, returnTo: String): Boolean
    completeSignIn(email: String!, secret: String!): AuthResult
    completeSignUp(email: String!, secret: String!, username: String!, name: String!, emoji: String!): AuthResult

    follow(username: String!): Boolean
    unfollow(username: String!): Boolean
    removeHistory(booqId: ID!): Boolean

    requestUpload: UploadRequest
    confirmUpload(uploadId: String!): UploadResult!

    deletePasskey(id: ID!): Boolean
    signout: Boolean
    deleteAccount: Boolean
    updateUser(input: UpdateUserInput!): UpdateUserResult
}

type UploadRequest {
    uploadId: String!
    uploadUrl: String!
}

type UploadResult {
    success: Boolean!
    booqId: ID
    title: String
    coverSrc: String
    error: String
}

type InitPasskeyRegistrationResponse {
    id: String!
    options: WebAtuhnCredentialCreationOptions
}
type InitPasskeyLoginResponse {
    id: String!
    options: WebAtuhnCredentialRequestOptions
}

scalar WebAtuhnCredentialCreationOptions
scalar WebAtuhnCredentialRequestOptions
scalar WebAtuhnCredential
scalar WebAuthnRegistrationResponseJSON
scalar WebAuthnAuthenticationResponseJSON

type Booq {
    id: ID!
    title: String
    authors: [String!]
    subjects: [String!]
    coverSrc: String
    bookmarks: [Bookmark]
    notes(username: String, limit: Int, offset: Int): [Note!]!
    preview(path: [Int!], end: [Int!], length: Int = 500): String
    chapter(path: [Int!]): BooqChapter
    expandedFragment(start: [Int!]!, end: [Int!]!): BooqFragment
    nodes: [BooqNode]
    styles: BooqNode
    tableOfContents: [TocItem!]
}

type Author {
    name: String!
    booqs(limit: Int, offset: Int): [Booq!]!
}

type User {
    id: ID!
    username: ID!
    joinedAt: String!
    name: String
    pictureUrl: String
    emoji: String
    followersCount: Int!
    followingCount: Int!
    followers: [User!]!
    following: [User!]!
    isFollowing: Boolean
    booqsWithNotes: [Booq!]!
    passkeys: [Passkey!]
}

type Passkey {
    id: ID!
    label: String
    createdAt: String!
}

union SearchResult = Booq | Author

input BookmarkInput {
    id: ID!
    booqId: ID!
    path: [Int!]!
}
input NoteInput {
    id: ID
    booqId: ID!
    kind: String!
    start: [Int!]
    end: [Int!]
    targetQuote: String
}
input BooqHistoryInput {
    booqId: ID!
    path: [Int!]!
}

scalar BooqNode

type BooqChapter {
    previous: BooqAnchor
    current: BooqAnchor!
    next: BooqAnchor
    fragment: BooqFragment!
}

type BooqFragment {
    start: [Int!]!
    end: [Int!]!
    nodes: [BooqNode]
    styles: BooqNode
}

type BooqAnchor {
    title: String
    path: [Int!]!
    position: Int!
}

type TocItem {
    path: [Int!]!
    position: Int!
    title: String!
    level: Int!
}

type Tag {
    tag: String!
    value: String
}
enum LibraryBrowseKind {
    search
    author
    subject
    language
}

type LibraryBrowseResult {
    booqs: [Booq!]!
    hasMore: Boolean!
}

type AuthResult {
    token: String
    user: User
}
type Bookmark {
    booq: Booq
    id: ID
    path: [Int!]
}
type Note {
    author: User
    booq: Booq
    id: ID
    start: [Int!]!
    end: [Int!]!
    kind: String
    text: String
    content: String
    targetQuote: String
    position: Int
    privacy: String
    createdAt: String
    updatedAt: String
}
type BooqHistory {
    booq: Booq!
    path: [Int!]!
    preview(length: Int = 500): String
    position: Int!
}
type Collection {
    name: String!
    booqs: [Booq!]
}

input CopilotContext {
    booqId: ID!
    start: [Int!]!
    end: [Int!]!
}
type Copilot {
    suggestions: [String!]
    answer(question: String!): String
}

input UpdateUserInput {
    name: String
    emoji: String
    username: String
}

type UpdateUserResult {
    success: Boolean!
    user: User
    error: String
    field: String
}